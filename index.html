<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>PNL Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --surface2: #161616;
      --border: #1e1e1e; --border2: #2a2a2a; --text: #e0e0e0;
      --muted: #555; --muted2: #888;
      --green: #00e676; --green-dim: #0d1a12; --green-border: #1a4a2a;
      --red: #ff4444; --red-dim: #1a0d0d;
    }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100dvh; overscroll-behavior: none;
    }

    /* LOGIN */
    #loginScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; flex-direction: column;
    }
    .login-box {
      background: var(--surface); border: 0.5px solid var(--border2);
      border-radius: 16px; padding: 32px 28px;
      width: 90%; max-width: 320px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .login-logo { font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
    .login-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .login-input {
      background: var(--bg); border: 0.5px solid var(--border2); color: var(--text);
      border-radius: 8px; padding: 12px 14px; font-size: 15px;
      font-family: 'Courier New', monospace; outline: none; width: 100%; letter-spacing: 3px;
    }
    .login-input:focus { border-color: #444; }
    .login-input::placeholder { letter-spacing: 0; color: #333; }
    .btn-login {
      background: var(--green-dim); border: 0.5px solid var(--green-border); color: var(--green);
      border-radius: 8px; padding: 12px; font-size: 13px;
      font-family: 'Courier New', monospace; font-weight: 700; cursor: pointer; letter-spacing: 1px;
    }
    .btn-login:hover { background: #112017; }
    .login-error { font-size: 11px; color: var(--red); text-align: center; min-height: 14px; }
    .login-hint { font-size: 10px; color: var(--muted); text-align: center; }

    /* APP */
    #app { max-width: 560px; margin: 0 auto; padding: 20px 14px 40px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .logo { font-size: 11px; letter-spacing: 3px; color: var(--muted2); text-transform: uppercase; font-weight: 700; }
    .sync-pill {
      display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted);
      background: var(--surface); border: 0.5px solid var(--border2); padding: 4px 10px; border-radius: 20px;
    }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; animation: pulse 2.5s infinite; }
    .dot-green { background: var(--green); }
    .dot-amber { background: #f59e0b; }
    .dot-red { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .nav-btn {
      background: var(--surface); border: 0.5px solid var(--border2); color: var(--muted2);
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .month-label { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 1px; }

    .total-block { margin-bottom: 6px; }
    .total-amount { font-size: 36px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
    .pos { color: var(--green); } .neg { color: var(--red); } .zero { color: var(--muted); }

    .progress-track { height: 2px; background: var(--border); border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }
    .progress-fill.neg-fill { background: var(--red); }

    .stats-row {
      display: flex; margin-bottom: 16px;
      background: var(--surface); border: 0.5px solid var(--border2); border-radius: 10px; overflow: hidden;
    }
    .stat-box { flex: 1; padding: 10px; text-align: center; border-right: 0.5px solid var(--border2); }
    .stat-box:last-child { border-right: none; }
    .stat-val { font-size: 16px; font-weight: 700; }
    .stat-lbl { font-size: 9px; color: var(--muted); letter-spacing: 0.5px; margin-top: 1px; text-transform: uppercase; }

    .days-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }
    .day-hdr { text-align: center; font-size: 9px; color: var(--muted); letter-spacing: 1px; padding: 4px 0; font-weight: 700; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cell {
      background: var(--surface); border: 0.5px solid var(--border); border-radius: 7px;
      min-height: 58px; padding: 5px 5px 4px; cursor: pointer;
      display: flex; flex-direction: column;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cell:hover { border-color: var(--border2); background: var(--surface2); }
    .cell:active { transform: scale(0.97); }
    .cell.today { border-color: #333; }
    .cell.has-pos { background: var(--green-dim); border-color: var(--green-border); }
    .cell.has-neg { background: var(--red-dim); border-color: #4a1a1a; }
    .cell.empty { background: transparent; border-color: transparent; cursor: default; }
    .cell.empty:hover { background: transparent; border-color: transparent; }
    .cell-num { font-size: 9px; color: var(--muted); margin-bottom: 3px; }
    .cell-pnl { font-size: 11px; font-weight: 700; margin-top: auto; }
    .cell-pnl.pos { color: var(--green); }
    .cell-pnl.neg { color: var(--red); }
    .cell-pnl.zero { color: #2a2a2a; font-size: 10px; font-weight: 400; }
    .cell-bar { height: 2px; border-radius: 2px; margin-top: 3px; }

    .streak-row { display: flex; justify-content: space-between; margin-top: 12px; font-size: 10px; color: var(--muted); border-top: 0.5px solid var(--border); padding-top: 10px; }

    /* MODAL */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200; padding-bottom: env(safe-area-inset-bottom, 0);
    }
    @media (min-width: 500px) { .overlay { align-items: center; } }
    .modal {
      background: #111; border: 0.5px solid var(--border2);
      border-radius: 16px 16px 0 0; padding: 20px 20px 28px;
      width: 100%; max-width: 480px;
    }
    @media (min-width: 500px) { .modal { border-radius: 16px; max-width: 360px; } }
    .modal-handle { width: 36px; height: 3px; background: #333; border-radius: 2px; margin: 0 auto 16px; }
    @media (min-width: 500px) { .modal-handle { display: none; } }
    .modal-tag { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
    .modal-date-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
    .trade-list { margin-bottom: 4px; max-height: 200px; overflow-y: auto; }
    .trade-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
    .trade-row:last-child { border-bottom: none; }
    .trade-name { font-size: 11px; color: var(--muted2); }
    .trade-right { display: flex; align-items: center; gap: 8px; }
    .trade-val { font-size: 13px; font-weight: 700; }
    .trade-del { background: none; border: none; color: #333; cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 4px; }
    .trade-del:hover { color: var(--red); }
    .no-trades { font-size: 11px; color: #333; padding: 10px 0; }
    .modal-total-row { display: flex; justify-content: space-between; align-items: baseline; padding: 10px 0; border-top: 0.5px solid var(--border2); border-bottom: 0.5px solid var(--border2); margin: 4px 0 14px; }
    .modal-total-lbl { font-size: 11px; color: var(--muted); }
    .modal-total-val { font-size: 22px; font-weight: 700; }
    .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .trade-input {
      flex: 1; background: var(--bg); border: 0.5px solid var(--border2); color: var(--text);
      border-radius: 8px; padding: 10px 12px; font-size: 15px;
      font-family: 'Courier New', monospace; outline: none; -webkit-appearance: none;
    }
    .trade-input:focus { border-color: #444; }
    .trade-input::placeholder { color: #333; }
    .btn-add {
      background: var(--green-dim); border: 0.5px solid var(--green-border); color: var(--green);
      border-radius: 8px; padding: 10px 16px; font-size: 13px;
      font-family: 'Courier New', monospace; font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    .btn-add:hover { background: #112017; }
    .btn-close {
      width: 100%; background: var(--surface); border: 0.5px solid var(--border2); color: var(--muted2);
      border-radius: 8px; padding: 11px; font-size: 13px; font-family: 'Courier New', monospace; cursor: pointer;
    }
    .btn-close:hover { background: var(--surface2); }

    .loading-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; flex-direction: column; gap: 12px;
    }
    .loading-spinner {
      width: 24px; height: 24px; border: 2px solid var(--border2);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 11px; color: var(--muted); letter-spacing: 2px; }

    @media (max-width: 380px) {
      .cell { min-height: 48px; }
      .cell-pnl { font-size: 10px; }
      .total-amount { font-size: 28px; }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-text">A sincronizar...</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none">
  <div class="login-box">
    <div class="login-logo">PNL Calendar</div>
    <div class="login-title">Acesso privado</div>
    <input class="login-input" type="password" id="pwdInput" placeholder="password" autocomplete="current-password" />
    <button class="btn-login" onclick="tryLogin()">Entrar</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">Acesso restrito ao proprietário</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="header">
    <span class="logo">PNL Calendar</span>
    <div class="sync-pill">
      <span class="sync-dot dot-amber" id="syncDot"></span>
      <span id="syncLabel">sync</span>
    </div>
  </div>
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="total-block">
    <div class="total-amount" id="totalAmount">$0.00</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="stats-row" id="statsRow"></div>
  <div class="days-header" id="daysHeader"></div>
  <div class="calendar-grid" id="calGrid"></div>
  <div class="streak-row" id="streakRow"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-tag">Registar trades</div>
    <div class="modal-date-title" id="modalTitle"></div>
    <div class="trade-list" id="tradeList"></div>
    <div class="modal-total-row">
      <span class="modal-total-lbl">Total do dia</span>
      <span class="modal-total-val" id="modalTotal">$0.00</span>
    </div>
    <div class="input-row">
      <input class="trade-input" type="number" id="tradeInput" placeholder="ex: 45.50 ou -12" step="0.01" inputmode="decimal" />
      <button class="btn-add" onclick="addTrade()">+ Add</button>
    </div>
    <button class="btn-close" onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
  // ── CONFIG ────────────────────────────────────────────
  const PASSWORD    = '123456789';
  const SUPA_URL    = 'https://nfpnhchjgkvvdbaivgtm.supabase.co';
  const SUPA_KEY    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mcG5oY2hqZ2t2dmRiYWl2Z3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTcwMjAsImV4cCI6MjA5MzQ5MzAyMH0.FiGxJpH4IDGMXw5GXsqbE9dRtOhxa5xi8KUzlAKC4AY';
  const SESSION_KEY = 'pnlcal_auth';
  // ─────────────────────────────────────────────────────

  const MONTHS  = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DAYS_PT = ['SEG','TER','QUA','QUI','SEX','SÁB','DOM'];

  let db = {}, curY, curM, selD;
  const today = new Date();

  // ── SUPABASE HELPERS ──────────────────────────────────
  async function sbFetch(path, opts = {}) {
    const res = await fetch(SUPA_URL + path, {
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...opts.headers
      },
      ...opts
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  }

  async function loadFromSupabase() {
    setSyncStatus('amber', 'a sincronizar...');
    try {
      const rows = await sbFetch('/rest/v1/trades?select=*&order=created_at.asc');
      db = {};
      for (const row of rows) {
        if (!db[row.day_key]) db[row.day_key] = [];
        db[row.day_key].push({ id: row.id, amount: row.amount });
      }
      setSyncStatus('green', 'sincronizado');
    } catch(e) {
      setSyncStatus('red', 'erro sync');
      console.error(e);
    }
  }

  async function addToSupabase(dayKey, amount) {
    setSyncStatus('amber', 'a guardar...');
    try {
      const rows = await sbFetch('/rest/v1/trades', {
        method: 'POST',
        body: JSON.stringify({ day_key: dayKey, amount })
      });
      setSyncStatus('green', 'guardado');
      return rows[0].id;
    } catch(e) {
      setSyncStatus('red', 'erro ao guardar');
      throw e;
    }
  }

  async function deleteFromSupabase(id) {
    setSyncStatus('amber', 'a apagar...');
    try {
      await sbFetch('/rest/v1/trades?id=eq.' + id, { method: 'DELETE' });
      setSyncStatus('green', 'sincronizado');
    } catch(e) {
      setSyncStatus('red', 'erro ao apagar');
      throw e;
    }
  }

  function setSyncStatus(color, label) {
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    dot.className = 'sync-dot dot-' + color;
    lbl.textContent = label;
  }
  // ─────────────────────────────────────────────────────

  function dk(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  function dayTotal(k) { return (db[k]||[]).reduce((s,t)=>s+t.amount,0); }
  function fmt(v) { return (v>0?'+ $':'- $')+Math.abs(v).toFixed(2); }

  function render() {
    const daysInMonth = new Date(curY, curM+1, 0).getDate();
    const firstDow = new Date(curY, curM, 1).getDay();
    const offset = firstDow === 0 ? 6 : firstDow - 1;

    document.getElementById('monthLabel').textContent = MONTHS[curM] + ' ' + curY;

    let total=0, wins=0, losses=0, bestStreak=0, curStreak=0, allTrades=0;
    for (let d=1; d<=daysInMonth; d++) {
      const k=dk(curY,curM,d), trades=db[k]||[];
      if (trades.length > 0) {
        const t=dayTotal(k); total+=t; allTrades+=trades.length;
        if(t>0){wins++;curStreak++;bestStreak=Math.max(bestStreak,curStreak);}
        else{losses++;curStreak=0;}
      }
    }
    const liveStreak = curStreak;

    const ta = document.getElementById('totalAmount');
    ta.textContent = fmt(total);
    ta.className = 'total-amount '+(total>0?'pos':total<0?'neg':'zero');

    let maxDay=0;
    for(let d=1;d<=daysInMonth;d++){
      const t=Math.abs(dayTotal(dk(curY,curM,d)));
      if(t>maxDay) maxDay=t;
    }
    const pct = maxDay>0 ? Math.min(100,(Math.abs(total)/maxDay)*100) : 0;
    const pf = document.getElementById('progressFill');
    pf.style.width = pct+'%';
    pf.className = 'progress-fill'+(total<0?' neg-fill':'');

    document.getElementById('statsRow').innerHTML = `
      <div class="stat-box"><div class="stat-val pos">${wins}</div><div class="stat-lbl">Green</div></div>
      <div class="stat-box"><div class="stat-val neg">${losses}</div><div class="stat-lbl">Red</div></div>
      <div class="stat-box"><div class="stat-val">${allTrades}</div><div class="stat-lbl">Trades</div></div>
      <div class="stat-box"><div class="stat-val">${wins+losses>0?Math.round(wins/(wins+losses)*100):0}%</div><div class="stat-lbl">Win rate</div></div>
    `;

    document.getElementById('daysHeader').innerHTML = DAYS_PT.map(d=>`<div class="day-hdr">${d}</div>`).join('');

    const todY=today.getFullYear(),todM=today.getMonth(),todD=today.getDate();
    let html='';
    for(let i=0;i<offset;i++) html+=`<div class="cell empty"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const k=dk(curY,curM,d), trades=db[k]||[], t=dayTotal(k);
      const isToday=curY===todY&&curM===todM&&d===todD;
      const hasData=trades.length>0;
      let cls='cell';
      if(isToday) cls+=' today';
      if(hasData&&t>0) cls+=' has-pos';
      if(hasData&&t<0) cls+=' has-neg';
      const pnlCls=hasData?(t>0?'pos':t<0?'neg':'zero'):'zero';
      const pnlTxt=hasData?(t>0?'+$'+t.toFixed(2):'-$'+Math.abs(t).toFixed(2)):'$0';
      const barBg=hasData?(t>0?'#00e676':'#ff4444'):'transparent';
      html+=`<div class="${cls}" onclick="openModal(${d})">
        <div class="cell-num">${d}${isToday?' ●':''}</div>
        <div class="cell-pnl ${pnlCls}">${pnlTxt}</div>
        <div class="cell-bar" style="background:${barBg}"></div>
      </div>`;
    }
    document.getElementById('calGrid').innerHTML = html;

    document.getElementById('streakRow').innerHTML=`
      <span>Streak atual: <strong style="color:var(--muted2)">${liveStreak}d</strong></span>
      <span>Melhor em ${MONTHS[curM].slice(0,3)}: <strong style="color:var(--muted2)">${bestStreak}d</strong></span>
    `;
  }

  function openModal(d) {
    selD=d;
    document.getElementById('modalTitle').textContent=`${d} de ${MONTHS[curM]} de ${curY}`;
    refreshModal(dk(curY,curM,d));
    document.getElementById('tradeInput').value='';
    document.getElementById('overlay').style.display='flex';
    setTimeout(()=>document.getElementById('tradeInput').focus(),150);
  }

  function refreshModal(k) {
    const trades=db[k]||[], t=dayTotal(k);
    const mv=document.getElementById('modalTotal');
    mv.textContent=fmt(t);
    mv.className='modal-total-val '+(t>0?'pos':t<0?'neg':'zero');
    if(!trades.length){
      document.getElementById('tradeList').innerHTML='<div class="no-trades">Sem trades registados neste dia.</div>';
      return;
    }
    document.getElementById('tradeList').innerHTML=trades.map((tr,i)=>`
      <div class="trade-row">
        <span class="trade-name">Trade ${i+1}</span>
        <div class="trade-right">
          <span class="trade-val ${tr.amount>0?'pos':tr.amount<0?'neg':'zero'}">${tr.amount>0?'+$'+tr.amount.toFixed(2):'-$'+Math.abs(tr.amount).toFixed(2)}</span>
          <button class="trade-del" onclick="delTrade('${k}','${tr.id}')">✕</button>
        </div>
      </div>`).join('');
  }

  async function addTrade() {
    const v=parseFloat(document.getElementById('tradeInput').value);
    if(isNaN(v)) return;
    const k=dk(curY,curM,selD);
    const btn=document.querySelector('.btn-add');
    btn.disabled=true;
    try {
      const id = await addToSupabase(k, v);
      if(!db[k]) db[k]=[];
      db[k].push({id, amount:v});
      render(); refreshModal(k);
      document.getElementById('tradeInput').value='';
      document.getElementById('tradeInput').focus();
    } catch(e) { alert('Erro ao guardar trade. Tenta novamente.'); }
    btn.disabled=false;
  }

  async function delTrade(k, id) {
    try {
      await deleteFromSupabase(id);
      db[k] = (db[k]||[]).filter(t=>t.id!==id);
      if(!db[k].length) delete db[k];
      render(); refreshModal(k);
    } catch(e) { alert('Erro ao apagar trade.'); }
  }

  function closeModal() { document.getElementById('overlay').style.display='none'; }
  function overlayClick(e) { if(e.target.id==='overlay') closeModal(); }
  function changeMonth(dir) {
    curM+=dir;
    if(curM>11){curM=0;curY++;}
    else if(curM<0){curM=11;curY--;}
    render();
  }

  document.addEventListener('keydown',e=>{
    if(e.key==='Escape') closeModal();
    if(e.key==='Enter'&&document.getElementById('overlay').style.display!=='none') addTrade();
  });

  // ── AUTH ──────────────────────────────────────────────
  function tryLogin() {
    const val=document.getElementById('pwdInput').value;
    if(val===PASSWORD){
      sessionStorage.setItem(SESSION_KEY,'1');
      document.getElementById('loginScreen').style.display='none';
      startApp();
    } else {
      const err=document.getElementById('loginError');
      err.textContent='Password incorreta. Tenta novamente.';
      document.getElementById('pwdInput').value='';
      document.getElementById('pwdInput').focus();
      setTimeout(()=>err.textContent='',3000);
    }
  }
  document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('pwdInput').addEventListener('keydown',e=>{ if(e.key==='Enter') tryLogin(); });
  });

  async function startApp() {
    document.getElementById('loadingScreen').style.display='flex';
    await loadFromSupabase();
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('app').style.display='block';
    curY=today.getFullYear();
    curM=today.getMonth();
    render();
  }

  function checkAuth() {
    document.getElementById('loadingScreen').style.display='none';
    if(sessionStorage.getItem(SESSION_KEY)==='1'){
      startApp();
    } else {
      document.getElementById('loginScreen').style.display='flex';
      setTimeout(()=>document.getElementById('pwdInput').focus(),100);
    }
  }

  checkAuth();
</script>
</body>
</html>
